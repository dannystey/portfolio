name: Deploy on DigitalOcean

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Archive Build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            build
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PSWD }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
      - name: rsync build to digitalocean
        run: |
          rsync -avz build/ \
          ${{ secrets.USR }}@${{ secrets.HOST }}:/var/www/steylish/
      - name: Restart web server
        run: |
          ssh ${{ secrets.USR }}@${{ secrets.HOST }} "bash ~/start-ui.sh"

